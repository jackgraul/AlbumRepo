services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: albumrepo-backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend:8080
    container_name: albumrepo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped